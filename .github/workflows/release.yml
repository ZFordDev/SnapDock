name: SnapDock Release Pipeline

on:
  workflow_dispatch:
  push:
    branches:
      - main
    #  - 121-release-pipeline-improvements // test branch here

permissions:
  contents: write
  id-token: write

jobs:
  # ---------------------------------------------------------
  # 1. Desktop Installers (Windows + Linux)
  # ---------------------------------------------------------
  desktop:
    name: Desktop Installers
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Dependencies
        run: npm ci

      - name: Build Desktop Release
        run: npm run build:release

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/*.deb
            dist/*.AppImage
            dist/*.zip
            dist/*.dmg
          if-no-files-found: ignore

# ---------------------------------------------------------
# 2. Snap Store Build
# ---------------------------------------------------------
  snap:
    name: Snap Store Build
    runs-on: ubuntu-latest
    needs: desktop
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Dependencies
        run: npm ci

      - name: Build Store-Safe Version
        run: npm run build:release:store
          
      - name: Install Snapcraft
        uses: samuelmeuli/action-snapcraft@v2

      - name: Install LXD
        run: |
          sudo snap install lxd
          sudo lxd waitready
          sudo lxd init --auto
          sudo usermod -aG lxd $USER
          newgrp lxd

      - name: Pack Snap
        run: snapcraft pack

      - name: Snapcraft Login
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          echo "${{ secrets.SNAPCRAFT_LOGIN }}" | base64 -d > snapcraft.creds
          snapcraft login --with snapcraft.creds


      - name: Upload Snap Artifact
        uses: actions/upload-artifact@v4
        with:
          name: snap-package
          path: "*.snap"

      - name: Publish to Snap Store
        if: startsWith(github.ref, 'refs/tags/')
        run: snapcraft upload *.snap --release=stable

  # ---------------------------------------------------------
  # 3. Windows Store Build
  # ---------------------------------------------------------
  # cut for futher 

  # ---------------------------------------------------------
  # 4. GitHub Release
  # ---------------------------------------------------------
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [desktop, snap]
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**
          generate_release_notes: true
