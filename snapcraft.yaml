name: markdown-workspace
base: core22
version: '3.1.1'

title: SnapDock - Markdown Workspace
summary: Fast, clean Markdown editor
description: |
  SnapDock is a modern, distraction-free Markdown editor designed for people who want clarity, stability, and a writing environment that stays out of the way. It provides a clean, predictable workspace that avoids the plugin overload and IDE-level complexity found in many editors.

grade: stable
confinement: strict

contact: zforddev@gmail.com
website: https://snapdock.app
source-code: https://github.com/SnapDockStudio/SnapDock
issues: https://github.com/SnapDockStudio/SnapDock/issues
license: MIT

apps:
  snapdock:
    command: snapdock
    extensions: [gnome]
    plugs:
      - home
      - network
      - desktop
      - desktop-legacy
      - x11
      - wayland
      - opengl

parts:
  snapdock:
    plugin: dump
    source: ./dist/linux-unpacked
    stage-packages:
      - libasound2
      - libnss3
      - libx11-6
      - libxkbfile1
      - libsecret-1-0
      - libgtk-3-0
      - libglib2.0-0
      - libgdk-pixbuf2.0-0
      - libxss1
      - libxtst6
      - libxrandr2
      - libxdamage1
      - libxcomposite1
      - libxfixes3
      - libxext6
      - libxrender1
      - libxcb1
      - libdbus-1-3
      - libdrm2
      - libgbm1
      - libpango-1.0-0
      - libatk1.0-0
      - libcairo2
      - libatk-bridge2.0-0
      - libatspi2.0-0
      - libwayland-client0
      - libwayland-cursor0
      - libwayland-egl1
      - libxkbcommon0

layout:
  /usr/share/icons:
    bind: $SNAP/usr/share/icons
  /usr/share/mime:
    bind: $SNAP/usr/share/mime
